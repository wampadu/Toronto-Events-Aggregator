name: Toronto Weekend Eventbrite Events

on:
  schedule:
    - cron: '0 10 * * 5'  # Every Friday
  workflow_dispatch:

permissions:
  contents: write   # ✅ Required for pushing updates

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run script
        run: xvfb-run -a python events_emailer_eventbrite_only.py

      - name: Commit HTML file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add weekend_events_toronto.html
          git commit -m "Update weekend events" || echo "No changes"
          git push
