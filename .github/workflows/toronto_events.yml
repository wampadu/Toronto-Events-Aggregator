name: Toronto Weekend Events

on:
  schedule:
    - cron: '0 10 * * 5'   # Every Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install --with-deps

      # ✅ Run BOTH scripts
      - name: Run all scrapers
        run: |
          xvfb-run -a python events_emailer.py
          xvfb-run -a python events_emailer_eventbrite_only.py

      # ✅ Commit BOTH HTML pages
      - name: Commit and push HTML files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.html
          git commit -m "Update all event pages" || echo "No changes"
          git push
